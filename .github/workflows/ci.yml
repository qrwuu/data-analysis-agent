name: Quality checks

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python 3.11
    runs-on: ubuntu-latest
    env:
      BAA_SKIP_DEPENDENCY_CHECK: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Run core regression tests
        run: |
          python -m unittest \
            Test.test_api_smoke \
            Test.test_validate \
            Test.test_ecommerce_metrics \
            Test.test_schema_mapper \
            Test.test_data_quality_service \
            Test.test_diagnosis_rules \
            -v

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint and build
        run: |
          pnpm format:check
          pnpm lint
          pnpm build:check
