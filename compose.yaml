services:
  app:
    build:
      context: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      BAA_HOST: 0.0.0.0
      AGENT_PORT: "5001"
      BAA_DATA_DIR: /data
      BAA_SKIP_DEPENDENCY_CHECK: "1"
    volumes:
      - ./runtime-data:/data
    expose:
      - "5001"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5001/api/health', timeout=5)"
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
