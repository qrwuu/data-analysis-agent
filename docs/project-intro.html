<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="数探智能数据分析 Agent 项目介绍视频" />
    <title>数探 Agent｜项目介绍视频</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", "Microsoft YaHei", sans-serif;
        background: #070b14;
        color: #f8fafc;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at 15% 15%, #312e8166, transparent 34rem),
          radial-gradient(circle at 85% 80%, #0369a166, transparent 32rem),
          #070b14;
      }

      main {
        width: min(1120px, 100%);
      }

      header {
        margin-bottom: 20px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(24px, 4vw, 42px);
        letter-spacing: -0.025em;
      }

      p {
        margin: 0;
        color: #a5b4c7;
        line-height: 1.7;
      }

      .player {
        overflow: hidden;
        border: 1px solid #ffffff24;
        border-radius: 18px;
        background: #020617;
        box-shadow: 0 24px 70px #00000066;
      }

      video {
        display: block;
        width: 100%;
        height: auto;
        aspect-ratio: 1280 / 716;
        background: #000;
      }

      footer {
        display: flex;
        flex-wrap: wrap;
        gap: 12px 18px;
        align-items: center;
        justify-content: space-between;
        margin-top: 16px;
        color: #94a3b8;
        font-size: 14px;
      }

      a {
        color: #93c5fd;
        text-decoration: none;
      }

      a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>数探｜智能数据分析 Agent</h1>
        <p>2 分 30 秒了解项目定位、核心能力与使用体验。</p>
      </header>

      <div class="player">
        <video controls preload="metadata" playsinline>
          <source src="./project-intro.mp4" type="video/mp4" />
          当前浏览器不支持 HTML5 视频，请使用下方链接下载观看。
        </video>
      </div>

      <footer>
        <span>原画质 · MP4 · H.264 · 约 21 MB</span>
        <span>
          <a href="./project-intro.mp4" download>下载视频</a>
          ·
          <a href="https://github.com/qrwuu/data-analysis-agent">返回 GitHub 仓库</a>
        </span>

</html>
